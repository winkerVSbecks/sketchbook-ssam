<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketchbook Gallery</title>
    <style>
      html,
      body {
        margin: 0;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 12px;
        padding: 12px;
      }
      .cell {
        position: relative;
        aspect-ratio: 1;
        background: #000;
        overflow: hidden;
      }
      .cell iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .label {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 4px 8px;
        font-size: 11px;
        background: rgba(0, 0, 0, 0.65);
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .label a {
        color: inherit;
        text-decoration: none;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="grid" id="grid"></div>
    <script type="module" src="./src/gallery.ts"></script>
  </body>
</html>
